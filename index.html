<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./images/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css"/>
  <link href="./src/output.css" rel="stylesheet">
</head>
<body>
    <header id="navbar" class="bg-green-950 fixed w-full top-0 left-0 z-50">
        <nav class="container1 flex items-center justify-between h-16 sm:h-20">
            <div class="font-lobster sm:text-2xl">IndorePlants.</div>

            <div id="nav-menu" class="absolute top-0 left-[-100%] min-h-[80vh] w-full bg-green-950/80 backdrop-blur-sm flex items-center justify-center duration-300 overflow-hidden lg:static lg:min-h-fit lg:bg-transparent lg:w-auto">
                <ul class="flex flex-col items-center gap-8 lg:flex-row">
                    <li><a href="#" class="nav-link">Home</a></li>
                    <li><a href="#" class="nav-link">About</a></li>
                    <li><a href="#" class="nav-link">Popular</a></li>
                    <li><a href="#" class="nav-link">Review</a></li>
                </ul>
                <div class="absolute bottom-0 right-10 opacity-90 lg:hidden">
                <img src="./images/leaf-1.png" alt="" class="w-32">
                </div>
                <div class="absolute -top-5 -left-5 rotate-90 opacity-90 lg:hidden">
                    <img src="./images/leaf-2.png" alt="" class="w-32">
                </div>
            </div>
            <div class="text-xl sm:text-3xl cursor-pointer z-50 lg:hidden">
                 <i class="ri-menu-4-line" id="hamburg"></i>
            </div>
            
        </nav>
    </header>

    <main>
        <section id="home relative">
            <div class="container">
                <div class="flex flex-col items-center gap-5 lg:flex-row">
                    <div class="w-full space-y-5 lg:w-1/2">
                        <h1>
                            <span class="text-yellow-500">Plants</span> make a 
                            <br>
                            positive
                            <span class="text-yellow-500">impact</span> on <br>
                            your environment
                        </h1>
                        <p class="text-slate-300 font-lobster">
                            Lorem ipsum dolor sit amet consectetur adipisicing elit. Aperiam dolor sit praesentium, veritatis ipsum aliquam sequi accusantium neque rem! Eaque?
                        </p>
                        <div class="flex flex-col gap-2 sm:flex-row md:gap-4 lg:pt-5 xlpt-10">
                            <button class="btn">
                                <span>Shop Now</span>
                                <i class="ri-leaf-line"></i>
                            </button>
                            <button class="btn btn_outline">
                                <span>Know More</span>
                                <i class="ri-leaf-line"></i>
                            </button>
                        </div>
                        <p class="text-xs font-lobster text-slate-300">You will get 30 days free trial.</p>
                        <div class="flex items-center gap-5 text-lg lg:p-10">
                            <i class="ri-facebook-fill socialMedia_icon"></i>
                            <i class="ri-twitter-x-fill socialMedia_icon"></i>
                            <i class="ri-instagram-fill socialMedia_icon"></i>
                            <i class="ri-linkedin-fill socialMedia_icon"></i>
                        </div>
                    </div>
                    <div class="w-full relative lg:w-1/2">
                        <img src="./images/home.png" alt="">
                        <div class="absolute -top-0 right-0 opacity-30 animate-move">
                            <i class="ri-leaf-line text-yellow-500 text-6xl "></i>
                        </div>
                         <div class="absolute bottom-0 left-0 opacity-30 animate-spin">
                            <i class="ri-flower-line text-yellow-500 text-6xl "></i>
                        </div>
                         <div class="hidden lg:block absolute -top-5 -left-5 opacity-30 animate-scale">
                            <i class="ri-plant-line text-6xl text-yellow-500"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        const navMenu = document.getElementById("nav-menu");
        const navLink = document.querySelectorAll(".nav-link");
        const hamburg = document.getElementById("hamburg");
        
        hamburg.addEventListener("click", () =>{
            navMenu.classList.toggle("left-[0]")
            hamburg.classList.toggle("ri-close-large-fill")
        })

        navLink.forEach(link => {
            link.addEventListener("click", () =>{
                navMenu.classList.toggle("left-[0]")
                hamburg.classList.toggle("ri-close-large-fill")
            })
        })
    </script>
</body>
</html>
